<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Sweep</title>
  <meta name="description" content="Auto-sweep your downloads, screenshots, and files into one organized vault.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf6f0;
      color: #4a3f35;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      max-width: 480px;
      width: 100%;
      padding: 24px;
      text-align: center;
    }

    .cta {
      margin-bottom: 48px;
    }

    .cta a {
      display: inline-block;
      background: #3d3428;
      color: #f0e8dc;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .cta a:hover { background: #4a3f35; }

    .cta-sub {
      font-size: 12px;
      color: #b5a898;
      margin-top: 12px;
    }

    .setup-box {
      background: #fff;
      border: 1px solid #e8e0d4;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 48px;
      text-align: left;
    }

    .setup-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #b5a898;
      margin-bottom: 16px;
    }

    .setup-step {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .setup-step:last-child { margin-bottom: 0; }

    .setup-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f5f0ea;
      color: #b8964e;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .setup-cmd {
      flex: 1;
      background: #3d3428;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: #f0e8dc;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .setup-cmd:hover { background: #4a3f35; }

    .setup-cmd span { color: #b8964e; }

    .copied-toast {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #8aad70;
      opacity: 0;
      transition: opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .copied-toast.show { opacity: 1; }

    .footer {
      font-size: 12px;
      color: #b5a898;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="cta">
      <a href="https://github.com/LaytonGott/file-sweep-app">Download from GitHub</a>
      <div class="cta-sub">Free &middot; Open source &middot; Runs locally</div>
    </div>

    <div class="setup-box">
      <div class="setup-label">Setup</div>
      <div class="setup-step">
        <div class="setup-num">1</div>
        <div class="setup-cmd" onclick="copy(this, 'git clone https://github.com/LaytonGott/file-sweep-app.git')">
          git clone https://github.com/LaytonGott/file-sweep-app.git
          <span class="copied-toast">Copied</span>
        </div>
      </div>
      <div class="setup-step">
        <div class="setup-num">2</div>
        <div class="setup-cmd" onclick="copy(this, 'cd file-sweep-app && npm install')">
          <span>cd</span> file-sweep-app <span>&&</span> npm install
          <span class="copied-toast">Copied</span>
        </div>
      </div>
      <div class="setup-step">
        <div class="setup-num">3</div>
        <div class="setup-cmd" onclick="copy(this, 'npm start')">
          <span>npm</span> start
          <span class="copied-toast">Copied</span>
        </div>
      </div>
    </div>

    <div class="footer">by Layton Gott</div>
  </div>

  <script>
    function copy(el, text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = el.querySelector('.copied-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
      });
    }
  </script>
</body>
</html>
